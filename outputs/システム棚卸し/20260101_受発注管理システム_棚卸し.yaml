# 架空企業のサンプル（中堅食品卸の基幹システム想定）
# 「3問答えれば最初の骨格が出来る」ことを示すための見本。
# 課題・改造提案・ROI試算まで含めた、棚卸しの完成形イメージ。

システム名: "受発注管理システム（販売管理パッケージ Ver.5 カスタマイズ版）"
目的: "受注入力・在庫引き当て・出荷指示・売上計上の一元管理"
利用者:
  部署: ["営業事務", "倉庫部門", "経理部"]
  概算人数: 18
導入年: 2012
最終改修年: 2019

構成:
  フロントエンド: "Windows クライアント（社内PC8台）"
  バックエンド: "ベンダ独自フレームワーク（VB.NET）"
  DB: "SQL Server 2014（社内サーバー）"
  認証方式: "ID/パスワード（Active Directory 連携なし）"
  ホスティング: "オンプレ"
  連携先システム:
    - "会計システム（CSVエクスポート経由）"
    - "倉庫管理システム（夜間バッチ）"

課題:
  性能_可用性:
    - "月末・年末は処理が重く、画面遷移に5秒以上かかる"
    - "サーバー再起動時のフェイルオーバー機構がない"
  機能不足:
    - "EDI 受注に未対応（FAX/メール手入力のまま）"
    - "スマホ・タブレットからの参照不可"
  運用_保守:
    - "ベンダの保守契約が2027年で終了予定"
    - "カスタマイズ部分のドキュメントが残っていない"
  セキュリティ:
    - "Windows Server 2012 R2（サポート終了済）で稼働中"
    - "操作ログが取得できていない"
  属人化リスク:
    - "カスタマイズ部分を理解しているのは導入時の SE 1名のみ"

改造提案:
  改造で対応:
    - "EDI 受注対応のアドオン開発（既存パッケージのインタフェース利用）"
  置換が必要:
    - "Windows Server / SQL Server のバージョンアップ（OS とミドルの両方）"
    - "認証を Active Directory 連携へ移行"
  廃止候補:
    - "使われていない旧帳票出力機能（5年以上未使用を確認済）"

ROI試算:
  現在の年間維持コスト_万円: 480
  改造後の年間コスト_万円: 360
  初期投資_万円: 800
  年間削減見込み_万円: 120
  回収期間_年: 6.7

作成日: "2026-01-01"
最終更新: "2026-01-01"
バージョン: "1"
