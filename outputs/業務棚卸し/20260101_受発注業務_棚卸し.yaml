# 架空企業のサンプル（中堅食品卸を想定）
# 「3問答えれば最初の骨格が出来る」ことを示すための見本。
# 詳細工程は深掘りで埋めた状態を示している。

業務名: "受発注業務"
目的: "得意先からの注文を受け、当日中に出荷指示を確定させる"
担当部署: "営業事務"
担当者:
  - "営業事務 担当A（メイン）"
  - "営業事務 担当B（バックアップ）"

工程の概要:
  - "得意先からのFAX/メール注文を受領"
  - "基幹システムへ受注入力"
  - "在庫確認と出荷指示"

詳細工程:
  - ステップ: "FAX/メール受信の確認"
    所要時間_分: 15
    使うツール: ["FAX複合機", "Outlook"]
    担当: "営業事務 担当A"
    注意点: "10時までに来ない注文は電話で督促が必要"
  - ステップ: "受注入力（基幹システム）"
    所要時間_分: 60
    使うツール: ["基幹システム（販売管理）"]
    担当: "営業事務 担当A"
    注意点: "得意先コードの取り違えが過去に2件発生"
  - ステップ: "在庫引き当て・欠品時の代替提案"
    所要時間_分: 30
    使うツール: ["基幹システム", "在庫一覧Excel"]
    担当: "営業事務 担当A"
    注意点: "代替品判断は経験依存。担当Bは判断不可"
  - ステップ: "出荷指示書を倉庫へ送付"
    所要時間_分: 15
    使うツール: ["プリンタ", "社内便"]
    担当: "営業事務 担当A"
    注意点: "14時のカットオフを過ぎると翌日出荷"

関係者:
  社内: ["倉庫部門", "営業部", "経理部"]
  社外: ["得意先（小売・外食 計約120社）", "運送会社"]

入力:
  - "得意先からのFAX注文書"
  - "得意先からのメール注文（PDF/Excel添付）"
  - "電話による追加・修正依頼"
出力:
  - "受注データ（基幹システム内）"
  - "出荷指示書（紙）"
  - "欠品連絡（メール）"
ルール:
  - "14時までに受注入力を完了する"
  - "欠品時は必ず得意先へ電話連絡してから代替提案"
  - "新規得意先の与信枠は営業部長の承認が必要"
困りごと:
  - "FAX注文の文字が読めず確認電話が頻発"
  - "担当A不在時に処理が止まる（属人化）"
  - "代替品の判断基準がドキュメント化されていない"

# メタ
頻度: "毎日（土日祝除く）"
